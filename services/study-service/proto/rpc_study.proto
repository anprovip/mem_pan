syntax = "proto3";

package pb;

import "study_models.proto";

option go_package = "mem_pan/services/study-service/pb";

message StartSessionRequest {
    string deck_id          = 1;
    int32  new_cards_limit  = 2;
    int32  review_limit     = 3;
}

message StartSessionResponse {
    StudySession session = 1;
}

message GetSessionRequest {
    string session_id = 1;
}

message GetSessionResponse {
    StudySession session = 1;
}

message ReviewCardRequest {
    string session_id  = 1;
    string card_id     = 2;
    int32  rating      = 3;
    int32  duration_ms = 4;
}

message ReviewCardResponse {
    UserCardState user_card = 1;
}

message FinishSessionRequest {
    string session_id = 1;
}

message FinishSessionResponse {
    StudySession session = 1;
}

message GetDueCardsRequest {
    string deck_id = 1;
}

message GetDueCardsResponse {
    repeated DueCard cards = 1;
    int32            total = 2;
}

message GetRecentSessionCardsRequest {}

message GetRecentSessionCardsResponse {
    StudySession session = 1;
}

message GetRecentDecksRequest {}

message GetRecentDecksResponse {
    repeated RecentDeckItem decks = 1;
}

message GetDeckProgressRequest {
    string deck_id = 1;
}
