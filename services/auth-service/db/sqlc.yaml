version: "2"
sql:
  - engine: "postgresql"
    queries: "query"
    schema: "migration"
    gen:
      go:
        package: "db"
        out: "../internal/db"
        emit_json_tags: true
        emit_empty_slices: true
        overrides:
          - db_type: "user_role"
            go_type: "string"
          - db_type: "verification_token_type"
            go_type: "string"
          - column: "refresh_tokens.ip_address"
            go_type:
              import: "database/sql"
              type: "NullString"
