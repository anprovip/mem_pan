syntax = "proto3";

package pb;

import "models.proto";

option go_package = "mem_pan/services/deck-service/pb";

message GetCardRequest {
    string card_id = 1;
}

message GetCardResponse {
    Card card = 1;
}

message UpdateCardRequest {
    string card_id       = 1;
    string content_front = 2;
    string content_back  = 3;
    string image_url     = 4;
}

message UpdateCardResponse {
    Card card = 1;
}

message DeleteCardRequest {
    string card_id = 1;
}

message DeleteCardResponse {
    bool success = 1;
}
